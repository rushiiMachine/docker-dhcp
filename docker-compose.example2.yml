services:
  example:
    container_name: example
    image: ubuntu
    command: sleep infinity
    hostname: example
    mac_address: "00:00:00:00:00:00" # TODO: generate a unique MAC address
    networks:
      example-network:

  dhcp:
    container_name: example-dhcp
    image: ghcr.io/rushiimachine/docker-dhcp:1
    restart: always
    network_mode: "service:example"
    cap_add:
      - NET_ADMIN
    environment:
      INTERFACE: eth0 # TODO: specify network interface inside container (usually ethN, defaults to eth0)
    healthcheck:
      # Ensure that network interface is still attached
      test: ["CMD-SHELL", "ifconfig | grep -q eth || kill 1"]
      interval: 1m
      timeout: 3s
      retries: 1
      start_period: 30s
    

networks:
  example-network:
    driver: macvlan
    driver_opts:
      parent: eth0 # TODO: specify host network interface
    enable_ipv6: true
