services:
  example:
    container_name: example
    image: debian
    network_mode: "service:dhcp"
    command: sleep infinity
    healthcheck:
      # Ensure that network interface is still attached
      test: ["CMD-SHELL", "ifconfig | grep -q eth || kill 1"]
      interval: 1m
      timeout: 3s
      retries: 1
      start_period: 30s

  dhcp:
    container_name: example-dhcp
    image: ghcr.io/rushiimachine/docker-dhcp:test
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    cap_add:
      - NET_ADMIN
    networks:
      example-network:
    hostname: example
    mac_address: "4e:72:74:0a:b5:3b"


networks:
  example-network:
    driver: macvlan
    driver_opts:
      parent: eth0
    enable_ipv6: true
